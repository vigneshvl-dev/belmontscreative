<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belmonts | DevOps Command Center</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            color: rgba(255, 255, 255, 0.7);
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 162, 255, 0.8);
        }

        .status-indicators {
            display: flex;
            gap: 20px;
            font-family: monospace;
            font-size: 12px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-out;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(0, 162, 255, 0.2);
            border-top: 2px solid #00a2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="loader"></div>
    </div>

    <div class="ui-overlay">
        <div class="header">
            <div class="logo-text">Belmonts</div>
            <div class="status-indicators">
                <div class="status-item"><span class="dot"></span> NODE: ACTIVE</div>
                <div class="status-item"><span class="dot"
                        style="background-color: #ffaa00; box-shadow: 0 0 10px #ffaa00;"></span> PIPELINE: SYNCING</div>
                <div class="status-item"><span class="dot"></span> UPLINK: SECURE</div>
            </div>
        </div>
        <div class="footer">
            <div>DEVOPS COMMAND CENTER // SECTOR 7G</div>
            <div>[ 8K RESOLUTION // UNREAL ENGINE 5 STYLE ]</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Configuration ---
        const CONFIG = {
            logoUrl: 'https://i.postimg.cc/tRdBgWxq/belogo.jpg',
            colors: {
                blue: 0x00a2ff,
                gold: 0xffd700,
                bg: 0x050505,
                neon: 0x00ffff
            }
        };

        // --- Core Scene Components ---
        let scene, camera, renderer, controls, composer;
        let crest, particles, clock;
        let cameraState = {
            zoomingIntro: false,
            phase: 0, // 0: wide, 1: snap to macro, 2: steady
            timer: 0
        };

        function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(CONFIG.colors.bg, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 25); // Start wide and slightly above

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit for performance
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 2.0; // High contrast
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Post-processing
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                2.5, // High strength for cinematic punch
                0.3, // Sharp radius
                0.2  // Low threshold for intense glow
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = false;
            controls.enableZoom = false;
            controls.enablePan = false;

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.05));

            const blueLight = new THREE.PointLight(0x00a2ff, 15, 30);
            blueLight.position.set(5, 5, 10);
            scene.add(blueLight);

            const goldLight = new THREE.PointLight(0xffaa00, 10, 30);
            goldLight.position.set(-10, -5, -10);
            scene.add(goldLight);

            clock = new THREE.Clock();

            createCrest();
            createDataStreams();
            createBackgroundAssets();

            window.addEventListener('resize', onWindowResize);

            // Intro Orchestration
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    cameraState.zoomingIntro = true;
                }, 1000);
            }, 1000);

            animate();
        }

        // --- Assets & Textures ---
        const BASH_COMMANDS = [
            'sudo apt update', 'git push origin main', 'docker-compose up -d',
            'npm run build', 'kubectl get pods', 'ssh belmonts@cloud',
            'grep -r "belmonts" .', 'chmod +x deploy.sh', 'ls -la /var/www',
            'systemctl restart nginx', 'aws s3 sync . s3://belmonts', 'terraform apply'
        ];

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128; // Increased height for better aspect ratio
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 36px monospace';
            ctx.fillStyle = '#00a2ff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Neon glow
            ctx.shadowColor = '#00a2ff';
            ctx.shadowBlur = 15;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function createCrest() {
            const textureLoader = new THREE.TextureLoader();
            const logoTexture = textureLoader.load(CONFIG.logoUrl);

            // 1. Chrome Hexagonal Base
            const shape = new THREE.Shape();
            const sides = 6;
            const size = 1.25;
            for (let i = 0; i < sides; i++) {
                const angle = (i / sides) * Math.PI * 2;
                if (i === 0) shape.moveTo(size * Math.cos(angle), size * Math.sin(angle));
                else shape.lineTo(size * Math.cos(angle), size * Math.sin(angle));
            }
            shape.closePath();

            const geometry = new THREE.ExtrudeGeometry(shape, {
                depth: 0.2,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.1,
                bevelOffset: 0,
                bevelSegments: 5
            });
            geometry.center();

            // Advanced Metallic Chrome Material
            const chromeMaterial = new THREE.MeshStandardMaterial({
                color: 0xcccccc,
                metalness: 1.0,
                roughness: 0.05,
                emissive: 0x111111,
                envMapIntensity: 2.5
            });

            crest = new THREE.Mesh(geometry, chromeMaterial);
            scene.add(crest);

            // 2. Logo Overlay
            const logoGeo = new THREE.PlaneGeometry(1.6, 1.6);
            const logoMat = new THREE.MeshStandardMaterial({
                map: logoTexture,
                transparent: true,
                emissive: 0x444444,
                emissiveIntensity: 0.5,
                emissiveMap: logoTexture
            });

            const logoFront = new THREE.Mesh(logoGeo, logoMat);
            logoFront.position.z = 0.21;
            crest.add(logoFront);

            const logoBack = new THREE.Mesh(logoGeo, logoMat);
            logoBack.position.z = -0.21;
            logoBack.rotation.y = Math.PI;
            crest.add(logoBack);

            // 3. Electric Blue LED Edges (Bevel highlight)
            const ringGeo = new THREE.TorusGeometry(1.4, 0.04, 16, 100);
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0x00a2ff,
                emissive: 0x00a2ff,
                emissiveIntensity: 10.0,
                transparent: true,
                opacity: 0.8
            });
            const ledRingFront = new THREE.Mesh(ringGeo, ringMat);
            ledRingFront.position.z = 0.15;
            crest.add(ledRingFront);

            const ledRingBack = ledRingFront.clone();
            ledRingBack.position.z = -0.15;
            crest.add(ledRingBack);

            // 4. Outer Gold Ring
            const outerRingGeo = new THREE.TorusGeometry(1.9, 0.015, 16, 100);
            const outerRingMat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.gold });
            const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
            crest.add(outerRing);
        }

        function createDataStreams() {
            // Using individual plane meshes for text clarity instead of Points
            const particleCount = 100; // Fewer but high-quality text planes
            particles = new THREE.Group();

            for (let i = 0; i < particleCount; i++) {
                const cmd = BASH_COMMANDS[Math.floor(Math.random() * BASH_COMMANDS.length)];
                const texture = createTextTexture(cmd);
                const mat = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide,
                    opacity: 0.8
                });

                const geo = new THREE.PlaneGeometry(1.2, 0.3);
                const p = new THREE.Mesh(geo, mat);

                // Random starting positions in a tornado swirl
                const angle = Math.random() * Math.PI * 2;
                const radius = 3 + Math.random() * 5;
                const height = (Math.random() - 0.5) * 20;

                p.position.set(
                    Math.cos(angle) * radius,
                    height,
                    Math.sin(angle) * radius
                );

                p.rotation.y = -angle + Math.PI / 2;
                p.userData = {
                    speed: 0.02 + Math.random() * 0.05,
                    radius: radius,
                    angle: angle,
                    vSpeed: (Math.random() - 0.5) * 0.01
                };

                particles.add(p);
            }
            scene.add(particles);
        }

        function createBackgroundAssets() {
            const serverGroup = new THREE.Group();
            const count = 20;

            for (let i = 0; i < count; i++) {
                const h = 5 + Math.random() * 5;
                const geo = new THREE.BoxGeometry(2, h, 2);
                const wireframe = new THREE.EdgesGeometry(geo);
                const mat = new THREE.LineBasicMaterial({
                    color: 0xffaa00,
                    transparent: true,
                    opacity: 0.1
                });

                const rack = new THREE.LineSegments(wireframe, mat);

                const angle = (i / count) * Math.PI * 2;
                const dist = 15 + Math.random() * 5;
                rack.position.set(
                    Math.cos(angle) * dist,
                    -2,
                    Math.sin(angle) * dist
                );

                // Individual rack pulse speed
                rack.userData = { pulseOffset: Math.random() * Math.PI * 2 };

                serverGroup.add(rack);
            }
            scene.add(serverGroup);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const elapsed = clock.getElapsedTime();
            const delta = clock.getDelta();

            // 1. Camera Orchestration (Snap-Zoom)
            if (cameraState.zoomingIntro) {
                cameraState.timer += 0.016; // approx delta

                if (cameraState.phase === 0) {
                    // Slow approach
                    camera.position.z -= 0.05;
                    if (cameraState.timer > 2.0) {
                        cameraState.phase = 1; // Snap!
                        cameraState.timer = 0;
                    }
                } else if (cameraState.phase === 1) {
                    // Violent Snap-Zoom
                    const t = Math.min(cameraState.timer * 4.0, 1.0); // 0.25s snap
                    camera.position.lerpVectors(new THREE.Vector3(0, 5, 20), new THREE.Vector3(0, 0, 4), t);

                    // Add violent camera shake
                    camera.position.x += (Math.random() - 0.5) * 0.2 * (1.0 - t);
                    camera.position.y += (Math.random() - 0.5) * 0.2 * (1.0 - t);

                    if (t >= 1.0) {
                        cameraState.phase = 2;
                        controls.autoRotate = true;
                        controls.autoRotateSpeed = 2.0;
                    }
                }
            }

            // 2. Crest animation
            if (crest) {
                crest.position.y = Math.sin(elapsed * 0.5) * 0.15;
                crest.rotation.y += 0.01;
                crest.rotation.z = Math.sin(elapsed * 0.5) * 0.1;

                // Pulsate the logo and LED edges
                const pulse = 0.5 + Math.sin(elapsed * 4.0) * 0.5;
                crest.children.forEach(child => {
                    if (child.material) {
                        if (child.material.emissiveMap) {
                            // Toned down logo glow for visibility
                            child.material.emissiveIntensity = 0.2 + pulse * 0.4;
                        } else if (child.material.emissive) {
                            // Keep LED edges bright
                            child.material.emissiveIntensity = 5.0 + Math.sin(elapsed * 10.0) * 2.0;
                        }
                    }
                });
            }

            // 3. Bash Code Tornado Animation
            if (particles && particles.children) {
                particles.children.forEach((p, i) => {
                    const data = p.userData;
                    data.angle += data.speed;

                    // Tornado swirl logic
                    p.position.x = Math.cos(data.angle) * data.radius;
                    p.position.z = Math.sin(data.angle) * data.radius;
                    p.position.y += Math.sin(elapsed + i) * 0.02; // Float up/down

                    // Look at center
                    p.rotation.y = -data.angle + Math.PI / 2;

                    // Occasional high-speed vertical dash
                    if (Math.random() > 0.99) {
                        p.position.y += (Math.random() - 0.5) * 2;
                    }
                });
            }

            // 4. Background Server Rack Pulse
            scene.traverse(node => {
                if (node.userData && node.userData.pulseOffset !== undefined) {
                    const p = 0.05 + Math.sin(elapsed * 2.0 + node.userData.pulseOffset) * 0.05;
                    node.material.opacity = p;
                }
            });

            controls.update();
            composer.render();
        }

        init();
    </script>
</body>

</html>
